<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои статьи</title>
</head>
<body>
    <h1>Список статей</h1>
    {% for article in articles %}
        <article>
            <h2><a href="{% url 'article_detail' article.pk %}">{{ article.title }}</a></h2>
            <p><strong>Автор:</strong> {{ article.author }}</p>
            <p><strong>Средний рейтинг:</strong> {{ article.rating|floatformat:1 }} (голосов: {{ article.votes }})</p>
            <p>{{ article.text }}</p>
            <p><a href="{% url 'article_detail' article.pk %}">Открыть статью и проголосовать</a></p>

            <p>{{ article.text }}</p>
        </article>
        <hr>
    {% empty %}
        <p>Статей пока нет.</p>
    {% endfor %}
</body>
</html>
