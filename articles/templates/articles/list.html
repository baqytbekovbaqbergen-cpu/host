<!DOCTYPE html>
<head>
    <title>Articles</title>
</head>
<body>
    <h1>List</h1>
    {% for article in articles %}
        <article>
            <h2><a> href="{% url 'article_detail' article.pk %}">{{ article.title }}</a></h2>
            <p><strong>Author:</strong> {{ article.author }}</p>
            <p>{{ article.text }}</p>
        </article>
        <hr>
    {% empty %}
        <p>no articles</p>
    {% endfor %}
</body>
</html>
