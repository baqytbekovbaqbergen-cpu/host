<!DOCTYPE html>
<head>
    <h1>Contact us list</h1>
</head>
<body>
    {% for contact in contacts %}
        <article>
            <a href="{% url 'contact_detail' contact.pk %}">{{ contact.name }}</a>
            <p>{{contact.message}}</p>
        </article>
        <hr>
    {% empty %}
        <p>no message</p>
    {% endfor %}
</body>
</html>
